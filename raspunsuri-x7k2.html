<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Răspunsuri chestionar — doar pentru Flavius</title>
<style>
  :root{
    --bg:#0b0b0c; --panel:#141416; --panel2:#1a1a1d; --line:#2a2a2f;
    --txt:#f4f4f6; --muted:#9a9aa2; --lime:#c6f000; --lime-dim:#9fc400;
    --yes:#7CD67C; --maybe:#f0c24b; --no:#8a8a92;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:900px;margin:0 auto;padding:36px 20px 80px}
  h1{font-size:26px;font-weight:800}
  h1 span{color:var(--lime)}
  .sub{color:var(--muted);font-size:13.5px;margin-top:4px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:22px}
  .btn{background:var(--lime);color:#0b0b0c;font-weight:800;font-size:13.5px;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;text-decoration:none;display:inline-block}
  .btn:hover{background:#d4ff1a}
  .btn.sec{background:var(--panel2);color:var(--txt);border:1px solid var(--line);font-weight:600}
  .btn.sec:hover{border-color:var(--lime-dim);color:var(--lime)}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap}
  #status{color:var(--muted);font-size:14px;padding:30px 0;text-align:center}
  .count{font-size:13px;color:var(--muted);margin-bottom:14px}
  .count b{color:var(--lime)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
  .card .head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}
  .card .who{font-size:17px;font-weight:800}
  .card .who small{display:block;font-weight:500;font-size:13px;color:var(--muted);margin-top:2px}
  .card .when{font-size:12px;color:var(--muted);text-align:right}
  .card .when a{color:var(--lime);text-decoration:none;font-weight:700}
  .base{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .base span{font-size:12px;background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:4px 10px;color:#d0d0d5}
  .base span b{color:var(--lime);font-weight:700}
  .cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  @media(max-width:720px){.cols{grid-template-columns:1fr}}
  .col h5{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
  .col.yes h5{color:var(--yes)} .col.maybe h5{color:var(--maybe)} .col.no h5{color:var(--no)}
  .col ul{list-style:none;font-size:12.5px;color:#d0d0d5}
  .col li{padding:2px 0 2px 16px;position:relative}
  .col.yes li::before{content:"✔";position:absolute;left:0;color:var(--yes)}
  .col.maybe li::before{content:"◇";position:absolute;left:0;color:var(--maybe)}
  .col.no li::before{content:"✗";position:absolute;left:0;color:var(--no)}
  .col .none{color:#55555c;padding-left:0}
  .quote{margin-top:12px;background:#101a06;border-left:3px solid var(--lime);border-radius:8px;padding:10px 14px;font-size:13.5px;color:#e2e2e6}
  .quote b{color:var(--lime);font-size:11px;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
  .insp{margin-top:8px;font-size:12.5px;color:var(--muted)}
  .insp b{color:var(--txt)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Răspunsuri <span>chestionar</span></h1>
      <div class="sub">Pagină privată — doar pentru Flavius. Se încarcă direct din baza de date.</div>
    </div>
    <div class="btnrow">
      <button class="btn sec" onclick="loadData()">↻ Reîncarcă</button>
      <a class="btn" href="https://flaviusvr.app.n8n.cloud/webhook/chestionar-gsm-export">⬇ Descarcă Excel</a>
    </div>
  </div>

  <div class="count" id="countBox" style="display:none"><b id="nCount">0</b> răspunsuri primite</div>
  <div id="status">Se încarcă răspunsurile...</div>
  <div id="list"></div>
</div>

<script>
(function(){
  var LIST_URL = 'https://flaviusvr.app.n8n.cloud/webhook/chestionar-gsm-lista';

  var YMN = [
    ['piese_compat','Căutare piese după model telefon'],
    ['secondhand','Second-hand / resigilate marcate'],
    ['filtre_avansate','Filtre avansate pe specificații'],
    ['limita','Limită de cumpărare pe client'],
    ['easybox','Ridicare din Easybox'],
    ['ridicare','Ridicare din magazinul fizic'],
    ['cont','Cont de client + istoric'],
    ['vouchere','Cupoane reducere + listă dorințe'],
    ['recenzii','Păreri clienți + recomandări în coș'],
    ['whatsapp','Buton WhatsApp la produs'],
    ['analytics','Google Analytics'],
    ['gshopping','Google Shopping'],
    ['dashboard','Tablou de bord + alerte stoc'],
    ['chatbot','Chatbot pentru clienți'],
    ['service','Programări online la service'],
    ['v_emag','[Viitor] eMAG'],
    ['v_comparatoare','[Viitor] Comparatoare prețuri'],
    ['v_marketing','[Viitor] Mesaje automate vânzare'],
    ['v_fidelitate','[Viitor] Fidelitate cu puncte']
  ];
  var LVL = [
    ['produse','Produse'],
    ['incarcare','Încărcare'],
    ['plata','Plată'],
    ['facturare','Facturare'],
    ['awb','AWB'],
    ['seo','SEO'],
    ['autoproc','Procesare']
  ];

  function esc(s){ var d=document.createElement('div'); d.textContent=String(s==null?'':s); return d.innerHTML; }

  function render(rows){
    var list = document.getElementById('list');
    var status = document.getElementById('status');
    if(!rows.length){ status.textContent = 'Niciun răspuns încă. Trimite linkul chestionarului unui client!'; list.innerHTML=''; return; }
    status.style.display = 'none';
    document.getElementById('countBox').style.display = 'block';
    document.getElementById('nCount').textContent = rows.length;
    rows.sort(function(a,b){ return (b.id||0) - (a.id||0); });
    list.innerHTML = rows.map(function(r){
      function group(val){
        var items = YMN.filter(function(m){ return r[m[0]] === val; });
        if(!items.length) return '<li class="none">—</li>';
        return items.map(function(m){ return '<li>' + esc(m[1]) + '</li>'; }).join('');
      }
      var chips = LVL.map(function(m){ if(!r[m[0]]) return ''; return '<span>' + esc(m[1]) + ': <b>' + esc(r[m[0]]) + '</b></span>'; }).join('');
      var quote = r.altceva ? '<div class="quote"><b>În cuvintele lui</b>' + esc(r.altceva) + '</div>' : '';
      var insp = r.inspiratie ? '<div class="insp">Site care îi place: <b>' + esc(r.inspiratie) + '</b></div>' : '';
      var contact = [r.telefon ? '📞 ' + esc(r.telefon) : '', r.email ? '✉ ' + esc(r.email) : ''].filter(Boolean).join(' · ');
      return '<div class="card">' +
        '<div class="head">' +
          '<div class="who">' + esc(r.nume || '(fără nume)') + (r.firma ? ' — ' + esc(r.firma) : '') +
            '<small>' + contact + '</small></div>' +
          '<div class="when">' + esc(r.trimis_la || '') + (r.telefon ? '<br><a href="tel:' + esc(r.telefon) + '">Sună-l</a>' : '') + '</div>' +
        '</div>' +
        '<div class="base">' + chips + '</div>' +
        '<div class="cols">' +
          '<div class="col yes"><h5>🎯 Neapărat vrea</h5><ul>' + group('Sigur o vreau') + '</ul></div>' +
          '<div class="col maybe"><h5>✨ Ar fi bine</h5><ul>' + group('Poate') + '</ul></div>' +
          '<div class="col no"><h5>Nu dorește</h5><ul>' + group('Nu o doresc') + '</ul></div>' +
        '</div>' + quote + insp +
      '</div>';
    }).join('');
  }

  window.loadData = function(){
    var status = document.getElementById('status');
    status.style.display = 'block';
    status.textContent = 'Se încarcă răspunsurile...';
    fetch(LIST_URL).then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function(data){
      var rows = Array.isArray(data) ? data : (data ? [data] : []);
      render(rows);
    }).catch(function(e){
      status.textContent = 'Nu am putut încărca datele (' + e.message + '). Încearcă Reîncarcă sau verifică n8n.';
    });
  };
  loadData();
})();
</script>
</body>
  </html>
